<style>
  :root {
    --olive: #3D4A2A;          /* verde olivo principal */
    --olive-deep: #2E3A1F;     /* verde olivo profundo (gradiente) */
    --olive-soft: #4F5E3A;     /* verde olivo claro */
    --earth: #8B6F47;          /* color tierra */
    --earth-soft: #B89876;     /* tierra suave (acentos) */
    --cream: #F5F1E8;          /* crema cálido (fondo blanco hueso) */
    --ink: #1F2410;            /* texto principal */
    --ink-soft: #5A604A;       /* texto secundario */
    --line: #E5DFD0;           /* divisores */
    --white: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Inter Tight', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
  }

  .card {
    width: 100%;
    max-width: 460px;
    background: var(--cream);
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.6s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== HEADER VERDE OLIVO ===== */
  .header {
    position: relative;
    background: linear-gradient(160deg, var(--olive) 0%, var(--olive-deep) 100%);
    padding: 56px 28px 110px;
    text-align: center;
    color: var(--cream);
    overflow: hidden;
  }

  /* Textura sutil de grano */
  .header::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(184,152,118,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(184,152,118,0.06) 0%, transparent 50%);
    pointer-events: none;
  }

  /* Línea decorativa superior estilo "branding" */
  .brand-mark {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--earth-soft);
    margin-bottom: 36px;
    opacity: 0.9;
  }
  .brand-mark::before, .brand-mark::after {
    content: "";
    width: 24px;
    height: 1px;
    background: var(--earth-soft);
    opacity: 0.6;
  }

  .avatar-wrap {
    position: relative;
    width: 138px;
    height: 138px;
    margin: 0 auto 24px;
    border-radius: 50%;
    padding: 4px;
    background: linear-gradient(135deg, var(--earth-soft) 0%, var(--earth) 100%);
    box-shadow: 0 12px 32px rgba(0,0,0,0.25);
  }
  .avatar-wrap img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    border: 3px solid var(--olive-deep);
  }

  .name {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 32px;
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
    color: var(--cream);
  }

  .title {
    font-size: 14px;
    font-weight: 400;
    color: var(--earth-soft);
    letter-spacing: 0.02em;
  }
  .title .sep {
    margin: 0 8px;
    opacity: 0.5;
  }

  /* ===== ACCIONES RÁPIDAS (botones circulares flotantes) ===== */
  .quick-actions {
    position: relative;
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-top: -50px;
    padding: 0 28px;
    z-index: 2;
  }

  .qa-item {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--ink);
    transition: transform 0.2s ease;
  }
  .qa-item:active { transform: scale(0.94); }

  .qa-circle {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 20px rgba(46,58,31,0.18), 0 2px 4px rgba(0,0,0,0.04);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .qa-item:hover .qa-circle {
    transform: translateY(-2px);
    box-shadow: 0 12px 24px rgba(46,58,31,0.22), 0 2px 6px rgba(0,0,0,0.06);
  }
  .qa-circle svg {
    width: 24px;
    height: 24px;
    stroke: var(--olive);
    stroke-width: 1.8;
    fill: none;
  }
  .qa-circle.qa-wa svg {
    fill: var(--olive);
    stroke: none;
  }

  .qa-label {
    font-size: 12px;
    color: var(--ink-soft);
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  /* ===== CUERPO ===== */
  .body {
    padding: 40px 28px 24px;
  }

  .info-list {
    list-style: none;
  }

  .info-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 0;
    border-bottom: 1px solid var(--line);
    text-decoration: none;
    color: var(--ink);
    transition: opacity 0.15s ease;
  }
  .info-item:last-child { border-bottom: none; }
  .info-item:active { opacity: 0.6; }

  .info-icon {
    flex: 0 0 36px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(61,74,42,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
  }
  .info-icon svg {
    width: 16px;
    height: 16px;
    stroke: var(--olive);
    stroke-width: 1.8;
    fill: none;
  }

  .info-content { flex: 1; min-width: 0; }
  .info-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    margin-bottom: 2px;
  }
  .info-value {
    font-size: 15px;
    color: var(--ink);
    font-weight: 500;
    word-break: break-word;
  }

  /* ===== REDES SOCIALES ===== */
  .socials-section {
    padding: 28px 28px 16px;
  }
  .section-label {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--earth);
    text-align: center;
    margin-bottom: 18px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .section-label::before, .section-label::after {
    content: "";
    flex: 1;
    max-width: 60px;
    height: 1px;
    background: var(--line);
  }

  .socials {
    display: flex;
    justify-content: center;
    gap: 16px;
  }

  .social-btn {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    box-shadow: 0 4px 12px rgba(46,58,31,0.10);
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .social-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--olive) 0%, var(--olive-soft) 100%);
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .social-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 18px rgba(46,58,31,0.18);
  }
  .social-btn:hover::before { opacity: 1; }
  .social-btn:hover svg { fill: var(--cream); }
  .social-btn:active { transform: translateY(-1px); }

  .social-btn svg {
    width: 22px;
    height: 22px;
    fill: var(--olive);
    transition: fill 0.2s ease;
    position: relative;
    z-index: 1;
  }

  /* ===== BOTÓN AGREGAR CONTACTO ===== */
  .add-contact-wrap {
    padding: 24px 28px 36px;
  }
  .add-contact {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--olive) 0%, var(--olive-deep) 100%);
    color: var(--cream);
    text-decoration: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.02em;
    border: none;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(46,58,31,0.25);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    font-family: inherit;
  }
  .add-contact:active {
    transform: translateY(1px);
    box-shadow: 0 4px 12px rgba(46,58,31,0.25);
  }
  .add-contact svg {
    width: 20px;
    height: 20px;
    stroke: var(--cream);
    stroke-width: 2;
    fill: none;
  }

  /* ===== FOOTER ===== */
  .footer {
    padding: 8px 28px 28px;
    text-align: center;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.1em;
    opacity: 0.75;
  }

  /* Ajustes responsive finos */
  @media (max-width: 380px) {
    .header { padding: 48px 22px 100px; }
    .name { font-size: 28px; }
    .quick-actions { gap: 12px; }
    .qa-circle { width: 54px; height: 54px; }
    .body, .socials-section, .add-contact-wrap { padding-left: 22px; padding-right: 22px; }
  }
</style>
